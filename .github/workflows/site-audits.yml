name: Site Audits

on:
  workflow_dispatch:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PLAYWRIGHT_ENABLE_FIREFOX: "1"
      PLAYWRIGHT_ENABLE_WEBKIT: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Pass 1 local stack
        run: npm run qa:pass1

      - name: Run Pass 2 live stack
        if: github.event_name == 'workflow_dispatch'
        env:
          LIVE_BASE_URL: https://www.evochia.gr
          CRUX_API_KEY: ${{ secrets.CRUX_API_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          ZAP_TARGET_URL: https://www.evochia.gr
        run: npm run qa:pass2

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit-reports
          path: .reports
